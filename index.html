<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пасхальный Квиз | Desktop Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF85D0;
            --lime: #C1FF72;
            --blue: #72FFFF;
            --orange: #FFBD72;
            --bg: #F0F2F5;
            --black: #000000;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--black);
            overflow: hidden; /* Убираем лишнюю прокрутку на десктопе */
        }

        /* Декоративные стикеры на фоне */
        .bg-decor {
            position: absolute;
            font-size: 100px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(2px);
            user-select: none;
        }

        #quiz-container {
            width: 95%;
            max-width: 1100px; /* Широкий формат для ПК */
            background: white;
            border: 6px solid var(--black);
            border-radius: 60px;
            display: flex; /* Ряд для десктопа */
            overflow: hidden;
            box-shadow: 25px 25px 0px var(--black);
            position: relative;
            min-height: 600px;
        }

        /* ЛЕВАЯ ПАНЕЛЬ С КАРТИНКОЙ */
        .visual-panel {
            flex: 1;
            background: var(--blue);
            border-right: 6px solid var(--black);
            display: flex;
            flex-direction: column;
            padding: 30px;
            justify-content: center;
            align-items: center;
        }

        .image-box {
            width: 100%;
            height: 100%;
            max-height: 450px;
            border: 5px solid var(--black);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 10px 10px 0px var(--black);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ПРАВАЯ ПАНЕЛЬ С КОНТЕНТОМ */
        .content-panel {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .q-badge {
            align-self: flex-start;
            background: var(--pink);
            padding: 10px 25px;
            border: 4px solid var(--black);
            border-radius: 25px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }

        h2 {
            font-size: 2rem;
            margin: 0 0 40px 0;
            line-height: 1.2;
            font-weight: 900;
        }

        /* Сетка ответов 2 в ряд на десктопе */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 20px;
        }

        .btn-opt {
            background: white;
            border: 4px solid var(--black);
            border-radius: 30px;
            padding: 25px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-opt:hover {
            transform: translate(-6px, -6px);
            box-shadow: 8px 8px 0px var(--black);
            background-color: var(--lime);
        }

        .correct { background: var(--lime) !important; border-color: var(--black); }
        .wrong { background: #FF6B6B !important; color: white; }

        /* Прогресс-бар снизу */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: #eee;
            border-top: 6px solid var(--black);
        }

        .progress-fill {
            height: 100%;
            background: var(--orange);
            width: 0%;
            transition: 0.6s ease-in-out;
        }

        #next-btn {
            background: var(--black);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            display: none;
            align-self: center;
        }

        #final-screen {
            width: 100%;
            text-align: center;
            display: none;
            padding: 50px;
        }

        /* Адаптация под мобилки (на случай открытия с телефона) */
        @media (max-width: 900px) {
            #quiz-container { flex-direction: column; overflow-y: auto; height: 95vh; }
            .visual-panel { border-right: none; border-bottom: 6px solid var(--black); min-height: 300px; }
            .options-grid { grid-template-columns: 1fr; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Фоновые стикеры -->
    <div class="bg-decor" style="top: 10%; left: 5%;">🥚</div>
    <div class="bg-decor" style="bottom: 15%; left: 10%;">🕊️</div>
    <div class="bg-decor" style="top: 20%; right: 5%;">✨</div>
    <div class="bg-decor" style="bottom: 10%; right: 10%;">☀️</div>

    <div id="quiz-container">
        <!-- Геймплей -->
        <div id="quiz-ui" style="display: contents;">
            <div class="visual-panel">
                <div class="image-box">
                    <img id="q-image" src="1.jpg" alt="Пасхальная сцена">
                </div>
            </div>

            <div class="content-panel">
                <div class="q-badge" id="q-count">ВОПРОС 1/20</div>
                <h2 id="q-text">Загрузка интересного вопроса...</h2>
                
                <div class="options-grid" id="options"></div>

                <button id="next-btn" onclick="nextStep()">СЛЕДУЮЩИЙ ШАГ ➔</button>
            </div>

            <div class="progress-container">
                <div class="progress-fill" id="pb"></div>
            </div>
        </div>

        <!-- Финал -->
        <div id="final-screen">
            <h1 style="font-size: 6rem; margin: 0;">🎉</h1>
            <h2 style="font-size: 3rem;">ЭТО ПОБЕДА!</h2>
            <p id="total" style="font-size: 2.5rem; font-weight: 900; color: var(--pink);"></p>
            <button class="btn-opt" style="margin: 0 auto; width: 400px; background: var(--blue);" onclick="location.reload()">ИГРАТЬ ЕЩЕ РАЗ</button>
        </div>
    </div>

<script>
    const questions = [
        { q: "Что обнаружили женщины у гробницы Иисуса в пасхальное утро?", a: ["Охрану, которая проспала", "Отваленный камень и ангела", "Плащаницу с запиской", "Упаковку от яйца"], c: 1, img: "1.jpg" },
        { q: "Кто первым из апостолов зашёл в пустой гроб?", a: ["Пётр", "Иоанн", "Фома (просил фото)", "Иуда"], c: 0, img: "2.jpg" },
        { q: "Какой фразой обычно начинается пасхальное богослужение?", a: ["«Христос воскресе!»", "«С праздником!»", "«Христос воскрес!» — «Воистину!»", "«Господь жив!»"], c: 2, img: "3.jpg" },
        { q: "Почему на Пасху принято красить яйца?", a: ["Чтобы куры не грустили", "Легенда о Марии Магдалине", "Белые яйца хуже ловятся", "Для ремонта дорог"], c: 1, img: "4.jpg" },
        { q: "Сколько дней Иисус пробыл во гробе?", a: ["Три дня и три ночи", "До первой зарплаты", "Ровно 72 часа", "Два с половиной"], c: 0, img: "5.jpg" },
        { q: "Какой символ не связан напрямую с христианством?", a: ["Агнец", "Пасхальный кролик", "Свеча", "Кулич"], c: 1, img: "6.jpg" },
        { q: "Что сделали первосвященники после известия?", a: ["Обрадовались", "Подкупили стражников", "Объявили конкурс", "Ушли отдыхать"], c: 1, img: "7.jpg" },
        { q: "Что символизирует Гроб Господень?", a: ["Кулич", "Творожная пасха", "Яйцо", "Шоколадный заяц"], c: 1, img: "8.jpg" },
        { q: "Кто усомнился в воскресении?", a: ["Пётр", "Фома", "Андрей", "Матфей"], c: 1, img: "9.jpg" },
        { q: "Ответ на «Христос воскрес!»?", a: ["Спасибо", "Воистину воскрес!", "Привет", "На здоровье"], c: 1, img: "10.jpg" },
        { q: "Как называется неделя перед Пасхой?", a: ["Фан-уикенд", "Страстная седмица", "Генеральная уборка", "Марафон"], c: 1, img: "11.jpg" },
        { q: "Самая сложная «находка» (шуточно)?", a: ["Ковчег", "Колесница", "Пещера", "Яйцо под диваном"], c: 3, img: "12.jpg" },
        { q: "Сколько раз Иисус являлся после воскресения?", a: ["3", "5", "Не менее 10", "У холодильника"], c: 2, img: "13.jpg" },
        { q: "Символ крови Христа?", a: ["Сок", "Вино", "Квас", "Энергетик"], c: 1, img: "14.jpg" },
        { q: "Почему прячут яйца?", a: ["Чтобы не съели", "Традиция с кроликом", "Нет места", "Ради ежей"], c: 1, img: "15.jpg" },
        { q: "Кто первым увидел Иисуса?", a: ["Мария Иаковлева", "Мария Магдалина", "Саломея", "Жена Пилата"], c: 1, img: "16.jpg" },
        { q: "Что делают с яйцами?", a: ["Бьют", "Кидают", "Давят", "Переваривают"], c: 0, img: "17.jpg" },
        { q: "Мем с котиком?", a: ["ХВ", "Христос котится!", "Воистину мяу", "Яйцезаяц"], c: 1, img: "18.jpg" },
        { q: "Что в центре служения?", a: ["Письмо", "Пустой гроб", "Копилка", "ТВ"], c: 1, img: "19.jpg" },
        { q: "Почему кролик разносит яйца?", a: ["Я в логистике", "Это шоколад", "Поставщики", "Секрет"], c: 0, img: "20.jpg" }
    ];

    let current = 0, score = 0, locked = false;

    function init() {
        locked = false;
        const d = questions[current];
        document.getElementById('q-count').innerText = `ВОПРОС ${current + 1}/20`;
        document.getElementById('q-text').innerText = d.q;
        document.getElementById('q-image').src = d.img;
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options');
        container.innerHTML = '';
        
        d.a.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = t;
            b.onclick = () => {
                if (locked) return;
                locked = true;
                const cIdx = questions[current].c;
                if (i === cIdx) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); container.children[cIdx].classList.add('correct'); }
                document.getElementById('next-btn').style.display = 'block';
            };
            container.appendChild(b);
        });
        document.getElementById('pb').style.width = ((current + 1) / 20) * 100 + '%';
    }

    function nextStep() {
        current++;
        if (current < questions.length) init();
        else {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('total').innerText = `Твой результат: ${score} из 20`;
        }
    }

    init();
</script>
</body>
</html>
