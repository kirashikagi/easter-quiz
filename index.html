<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пасхальный Квиз | Universal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF85D0; --lime: #C1FF72; --blue: #72FFFF; --orange: #FFBD72; --black: #000;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Montserrat', sans-serif;
            background-color: #F0F2F5; color: var(--black);
        }

        /* Главный контейнер на весь экран */
        .app-wrapper {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 2vh;
        }

        #quiz-container {
            width: 100%; max-width: 1400px; height: 100%;
            background: white; border: clamp(3px, 0.5vh, 6px) solid var(--black);
            border-radius: clamp(20px, 4vh, 50px);
            display: flex; flex-direction: row; /* Десктоп по умолчанию */
            overflow: hidden; box-shadow: 15px 15px 0px var(--black);
            position: relative;
        }

        /* Левая часть - Визуал */
        .visual-panel {
            flex: 1.2; background: #fafafa;
            border-right: clamp(3px, 0.5vh, 6px) solid var(--black);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }

        .image-box {
            width: 100%; max-width: 100%;
            aspect-ratio: 2760 / 1504;
            border: clamp(3px, 0.4vh, 5px) solid var(--black);
            border-radius: 20px; overflow: hidden;
            box-shadow: 8px 8px 0px var(--black);
            background: #eee;
        }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Правая часть - Контент */
        .content-panel {
            flex: 1; padding: 3vh;
            display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .header-zone { margin-bottom: 1vh; }
        
        .q-badge {
            display: inline-block; background: var(--pink); padding: 0.5vh 1.5vw;
            border: 3px solid var(--black); border-radius: 12px;
            font-weight: 900; font-size: clamp(0.7rem, 1.5vh, 1rem);
            transform: rotate(-1deg);
        }

        h2 {
            font-size: clamp(1rem, 2.5vh, 1.6rem);
            margin: 1.5vh 0; line-height: 1.2; font-weight: 900;
        }

        /* Кнопки 2х2 */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 1.5vh; flex-grow: 1;
        }

        .btn-opt {
            background: white; border: clamp(2px, 0.3vh, 4px) solid var(--black);
            border-radius: 15px; padding: 1vh;
            font-size: clamp(0.7rem, 1.8vh, 1rem);
            font-weight: 700; cursor: pointer; transition: 0.2s;
            font-family: inherit; display: flex; align-items: center;
            justify-content: center; text-align: center; line-height: 1.2;
        }

        .btn-opt:hover { transform: translate(-3px, -3px); box-shadow: 4px 4px 0px var(--black); background: var(--blue); }
        .correct { background: var(--lime) !important; }
        .wrong { background: #FF6B6B !important; color: white; }

        /* Низ - Прогресс и Кнопка */
        .footer-zone {
            display: flex; align-items: center; justify-content: space-between;
            gap: 15px; margin-top: 2vh; height: 6vh;
        }

        .progress-bar {
            flex-grow: 1; height: 12px; background: #EEE;
            border: 2px solid var(--black); border-radius: 10px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--orange); width: 0%; transition: 0.4s; }

        #next-btn {
            background: var(--black); color: white; border: none;
            padding: 0 30px; height: 100%; border-radius: 30px;
            font-weight: 900; font-size: 1rem; cursor: pointer; visibility: hidden;
        }

        /* Адаптация под МОБИЛКИ (Вертикальный экран) */
        @media (max-aspect-ratio: 1/1) or (max-width: 800px) {
            #quiz-container { flex-direction: column; }
            .visual-panel { flex: 0.8; border-right: none; border-bottom: 5px solid var(--black); padding: 15px; }
            .content-panel { flex: 1.2; padding: 2vh; }
            .options-grid { gap: 1vh; }
            h2 { font-size: clamp(0.9rem, 2.2vh, 1.3rem); margin: 1vh 0; }
        }

        #final-screen { width: 100%; text-align: center; display: none; padding: 5vh; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div id="quiz-container">
            <div id="quiz-ui" style="display: contents;">
                <div class="visual-panel">
                    <div class="image-box"><img id="q-image" src="1.jpg"></div>
                </div>
                <div class="content-panel">
                    <div class="header-zone">
                        <div class="q-badge" id="q-count">ВОПРОС 1/20</div>
                        <h2 id="q-text">Загрузка...</h2>
                    </div>
                    
                    <div class="options-grid" id="options"></div>

                    <div class="footer-zone">
                        <div class="progress-bar"><div class="progress-fill" id="pb"></div></div>
                        <button id="next-btn" onclick="nextStep()">ДАЛЕЕ ➔</button>
                    </div>
                </div>
            </div>

            <div id="final-screen">
                <h1 style="font-size: 5vh; margin: 0;">🎉</h1>
                <h2 style="font-size: 4vh;">КВИЗ ЗАВЕРШЕН!</h2>
                <p id="total" style="font-size: 3vh; font-weight: 900; margin: 2vh 0;"></p>
                <button class="btn-opt" style="margin: 0 auto; width: 300px; height: 60px; background: var(--lime);" onclick="location.reload()">ИГРАТЬ СНОВА</button>
            </div>
        </div>
    </div>

<script>
    const format = 'jpg'; // Смени на png если нужно

    const questions = [
        { q: "Что, согласно Евангелиям, обнаружили женщины у гробницы Иисуса в пасхальное утро?", a: ["А) Охрану, которая проспала смену", "Б) Отваленный камень и ангела", "В) Забытую плащаницу с надписью «Скоро вернусь»", "Г) Пустую упаковку от пасхального яйца"], c: 1 },
        { q: "Кто первым из апостолов зашёл в пустой гроб?", a: ["А) Пётр (наперегонки с Иоанном, но пропустил его вперёд)", "Б) Иоанн", "В) Фома, который попросил сначала прислать фото", "Г) Иуда — но ему было уже не до визитов"], c: 0 },
        { q: "Какой приветственной фразой обычно начинается пасхальное богослужение?", a: ["А) «Христос воскресе!»", "Б) «С праздником, коллеги!»", "В) «Христос воскрес!» — «Воистину воскрес!»", "Г) «Господь жив — и мы с Ним!»"], c: 2 },
        { q: "Почему на Пасху принято красить яйца?", a: ["А) Чтобы куры не грустили", "Б) По легенде, Мария Магдалина принесла императору яйцо, которое покраснело", "В) Потому что белые яйца хуже ловятся", "Г) Для ремонта дорожных неровностей"], c: 1 },
        { q: "Сколько дней Иисус пробыл во гробе?", a: ["А) Три дня и три ночи", "Б) До первой зарплаты", "В) Ровно 72 часа", "Г) Два с половиной"], c: 0 },
        { q: "Какой символ не связан напрямую с христианством?", a: ["А) Агнец", "Б) Пасхальный кролик", "В) Свеча", "Г) Кулич"], c: 1 },
        { q: "Что сделали первосвященники после известия о воскресении?", a: ["А) Обрадовались", "Б) Подкупили стражников", "В) Объявили конкурс", "Г) Ушли отдыхать"], c: 1 },
        { q: "Что символизирует Гроб Господень?", a: ["А) Кулич", "Б) Творожная пасха", "В) Яйцо", "Г) Шоколадный заяц"], c: 1 },
        { q: "Кто усомнился в воскресении?", a: ["А) Пётр", "Б) Фома", "В) Андрей", "Г) Матфей"], c: 1 },
        { q: "Ответ на «Христос воскрес!»?", a: ["А) Спасибо", "Б) Воистину воскрес!", "В) И тебе не хворать", "Г) На здоровье"], c: 1 },
        { q: "Как называется неделя перед Пасхой?", a: ["А) Фан-уикенд", "Б) Страстная седмица", "В) Генеральная уборка", "Г) Марафон"], c: 1 },
        { q: "Самая сложная «находка» (шуточно)?", a: ["А) Ковчег", "Б) Колесница", "В) Пещера", "Г) Яйцо под диваном"], c: 3 },
        { q: "Сколько раз Иисус являлся после воскресения?", a: ["А) 3", "Б) 5", "В) Не менее 10", "Г) Каждый раз у холодильника"], c: 2 },
        { q: "Символ крови Христа?", a: ["А) Сок", "Б) Вино", "В) Квас", "Г) Энергетик"], c: 1 },
        { q: "Почему прячут яйца?", a: ["А) Чтобы не съели", "Б) Традиция с кроликом", "В) Нет места", "Г) Ради ежей"], c: 1 },
        { q: "Кто первым увидел Иисуса?", a: ["А) Мария, мать Иакова", "Б) Мария Магдалина", "В) Саломея", "Г) Жена Пилата"], c: 1 },
        { q: "Что делают с яйцами?", a: ["А) Бьют", "Б) Кидают", "В) Давят", "Г) Переваривают"], c: 0 },
        { q: "Мем с котиком?", a: ["А) ХВ", "Б) Христос котится!", "В) Воистину мяу", "Г) Яйцезаяц"], c: 1 },
        { q: "Что в центре служения?", a: ["А) Письмо", "Б) Пустой гроб", "В) Копилка", "Г) ТВ"], c: 1 },
        { q: "Почему кролик разносит яйца?", a: ["А) Я в логистике", "Б) Это шоколад", "В) Есть поставщики", "Г) Секрет"], c: 0 }
    ];

    let current = 0, score = 0, locked = false;

    function init() {
        locked = false;
        const d = questions[current];
        document.getElementById('q-count').innerText = `ВОПРОС ${current + 1}/20`;
        document.getElementById('q-text').innerText = d.q;
        document.getElementById('q-image').src = (current + 1) + '.' + format;
        document.getElementById('next-btn').style.visibility = 'hidden';
        
        const container = document.getElementById('options');
        container.innerHTML = '';
        
        d.a.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = t;
            b.onclick = () => {
                if (locked) return;
                locked = true;
                if (i === d.c) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); container.children[d.c].classList.add('correct'); }
                document.getElementById('next-btn').style.visibility = 'visible';
            };
            container.appendChild(b);
        });
        document.getElementById('pb').style.width = ((current + 1) / 20) * 100 + '%';
    }

    function nextStep() {
        current++;
        if (current < questions.length) init();
        else {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('total').innerText = `Счёт: ${score} из 20`;
        }
    }
    init();
</script>
</body>
</html>
