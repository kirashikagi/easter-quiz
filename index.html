<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пасхальный Квиз | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF85D0;
            --lime: #C1FF72;
            --blue: #72FFFF;
            --orange: #FFBD72;
            --bg: #F0F2F5;
            --black: #000000;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--black);
            padding: 20px;
        }

        /* Декоративные стикеры */
        .bg-decor { position: absolute; font-size: 80px; z-index: -1; opacity: 0.2; user-select: none; }

        #quiz-container {
            width: 100%;
            max-width: 1350px; /* Увеличили ширину под большой формат */
            background: white;
            border: 6px solid var(--black);
            border-radius: 50px;
            display: flex; 
            overflow: hidden;
            box-shadow: 25px 25px 0px var(--black);
            position: relative;
        }

        /* ЛЕВАЯ ПАНЕЛЬ С КАРТИНКОЙ */
        .visual-panel {
            flex: 1.4; /* Картинка теперь занимает больше места */
            background: #f9f9f9;
            border-right: 6px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        /* РАМКА ПОД ФОРМАТ 2760х1504 */
        .image-box {
            width: 100%;
            aspect-ratio: 2760 / 1504; /* ТОЧНЫЕ ПРОПОРЦИИ ТВОЕЙ КАРТИНКИ */
            border: 6px solid var(--black);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 12px 12px 0px var(--black);
            background: #eee;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Картинка заполнит рамку без искажений */
        }

        /* ПРАВАЯ ПАНЕЛЬ С КОНТЕНТОМ */
        .content-panel {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .q-badge {
            align-self: flex-start;
            background: var(--lime);
            padding: 10px 25px;
            border: 4px solid var(--black);
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transform: rotate(-1deg);
        }

        h2 {
            font-size: 2.2rem;
            margin: 0 0 35px 0;
            line-height: 1.2;
            font-weight: 900;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr; /* В один ряд для лучшей читаемости длинных текстов */
            gap: 15px;
        }

        .btn-opt {
            background: white;
            border: 4px solid var(--black);
            border-radius: 22px;
            padding: 22px 30px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            text-align: left;
        }

        .btn-opt:hover {
            transform: translate(-5px, -5px);
            box-shadow: 7px 7px 0px var(--black);
            background-color: var(--blue);
        }

        .correct { background: var(--lime) !important; }
        .wrong { background: #FF6B6B !important; color: white; }

        .progress-container {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 20px;
            background: #eee;
            border-top: 6px solid var(--black);
        }

        .progress-fill { height: 100%; background: var(--pink); width: 0%; transition: 0.6s; }

        #next-btn {
            background: var(--black);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            display: none;
            align-self: center;
        }

        #final-screen { width: 100%; text-align: center; display: none; padding: 100px; }

        /* Адаптация под меньшие экраны */
        @media (max-width: 1100px) {
            #quiz-container { flex-direction: column; max-width: 700px; }
            .visual-panel { border-right: none; border-bottom: 6px solid var(--black); }
            h2 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <div class="bg-decor" style="top: 5%; left: 5%;">🥚</div>
    <div class="bg-decor" style="bottom: 5%; right: 5%;">🕊️</div>

    <div id="quiz-container">
        <div id="quiz-ui" style="display: contents;">
            <div class="visual-panel">
                <div class="image-box">
                    <img id="q-image" src="1.jpg">
                </div>
            </div>

            <div class="content-panel">
                <div class="q-badge" id="q-count">ВОПРОС 1/20</div>
                <h2 id="q-text">Загрузка...</h2>
                <div class="options-grid" id="options"></div>
                <button id="next-btn" onclick="nextStep()">ДАЛЕЕ ➔</button>
            </div>

            <div class="progress-container">
                <div class="progress-fill" id="pb"></div>
            </div>
        </div>

        <div id="final-screen">
            <h1 style="font-size: 5rem;">🏆</h1>
            <h2 style="font-size: 3rem;">КВИЗ ПРОЙДЕН!</h2>
            <p id="total" style="font-size: 2.2rem; font-weight: 900;"></p>
            <button class="btn-opt" style="margin: 0 auto; width: 350px; background: var(--orange); text-align:center;" onclick="location.reload()">ИГРАТЬ СНОВА</button>
        </div>
    </div>

<script>
    // Проверь, чтобы формат был именно jpg (или поменяй на png ниже)
    const format = 'jpg'; 

    const questions = [
        { q: "Что обнаружили женщины у гробницы Иисуса в пасхальное утро?", a: ["Охрану, которая проспала смену", "Отваленный камень и ангела", "Забытую плащаницу с надписью «Скоро вернусь»", "Пустую упаковку от пасхального яйца"], c: 1 },
        { q: "Кто первым из апостолов зашёл в пустой гроб?", a: ["Пётр (пропустил Иоанна вперёд)", "Иоанн", "Фома, который попросил фото", "Иуда — ему было не до визитов"], c: 0 },
        { q: "Какой приветственной фразой обычно начинается пасхальное богослужение?", a: ["«Христос воскресе!»", "«С праздником, коллеги!»", "«Христос воскрес!» — «Воистину воскрес!»", "«Господь жив — и мы с Ним!»"], c: 2 },
        { q: "Почему на Пасху принято красить яйца?", a: ["Чтобы куры не грустили", "По легенде, яйцо покраснело у императора", "Белые яйца хуже ловятся", "Для ремонта дорог"], c: 1 },
        { q: "Сколько дней Иисус пробыл во гробе?", a: ["Три дня и три ночи", "До первой зарплаты", "Ровно 72 часа", "Два с половиной"], c: 0 },
        { q: "Какой символ не связан напрямую с христианством?", a: ["Агнец", "Пасхальный кролик", "Свеча", "Кулич"], c: 1 },
        { q: "Что сделали первосвященники после известия?", a: ["Обрадовались", "Подкупили стражников", "Объявили конкурс", "Ушли отдыхать"], c: 1 },
        { q: "Что символизирует Гроб Господень?", a: ["Кулич", "Творожная пасха", "Яйцо", "Шоколадный заяц"], c: 1 },
        { q: "Кто усомнился в воскресении?", a: ["Пётр", "Фома", "Андрей", "Матфей"], c: 1 },
        { q: "Ответ на «Христос воскрес!»?", a: ["Спасибо", "Воистину воскрес!", "Привет", "На здоровье"], c: 1 },
        { q: "Как называется неделя перед Пасхой?", a: ["Фан-уикенд", "Страстная седмица", "Генеральная уборка", "Марафон"], c: 1 },
        { q: "Самая сложная «находка» (шуточно)?", a: ["Ковчег", "Колесница", "Пещера", "Яйцо под диваном"], c: 3 },
        { q: "Сколько раз Иисус являлся после воскресения?", a: ["3", "5", "Не менее 10", "У холодильника"], c: 2 },
        { q: "Символ крови Христа?", a: ["Сок", "Вино", "Квас", "Энергетик"], c: 1 },
        { q: "Почему прячут яйца?", a: ["Чтобы не съели", "Традиция с кроликом", "Нет места", "Ради ежей"], c: 1 },
        { q: "Кто первым увидел Иисуса?", a: ["Мария Иаковлева", "Мария Магдалина", "Саломея", "Жена Пилата"], c: 1 },
        { q: "Что делают с яйцами?", a: ["Бьют", "Кидают", "Давят", "Переваривают"], c: 0 },
        { q: "Мем с котиком?", a: ["ХВ", "Христос котится!", "Воистину мяу", "Яйцезаяц"], c: 1 },
        { q: "Что в центре служения?", a: ["Письмо", "Пустой гроб", "Копилка", "ТВ"], c: 1 },
        { q: "Почему кролик разносит яйца?", a: ["Я в логистике", "Это шоколад", "Поставщики", "Секрет"], c: 0 }
    ];

    let current = 0, score = 0, locked = false;

    function init() {
        locked = false;
        const d = questions[current];
        document.getElementById('q-count').innerText = `ВОПРОС ${current + 1}/20`;
        document.getElementById('q-text').innerText = d.q;
        document.getElementById('q-image').src = (current + 1) + '.' + format;
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options');
        container.innerHTML = '';
        
        d.a.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = t;
            b.onclick = () => {
                if (locked) return;
                locked = true;
                if (i === d.c) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); container.children[d.c].classList.add('correct'); }
                document.getElementById('next-btn').style.display = 'block';
            };
            container.appendChild(b);
        });
        document.getElementById('pb').style.width = ((current + 1) / 20) * 100 + '%';
    }

    function nextStep() {
        current++;
        if (current < questions.length) init();
        else {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('total').innerText = `Результат: ${score} из 20`;
        }
    }

    init();
</script>
</body>
</html>
